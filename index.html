<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днем Рождения ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:
        radial-gradient(circle at top,#222,#050505 70%);
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

.card{
    position:relative;
    z-index:2;
    width:420px;
    max-width:90vw;
    padding:18px;
    border:5px solid gold;
    border-radius:28px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    box-shadow:
        0 0 25px gold,
        0 0 60px rgba(255,215,0,.4);
    text-align:center;
}

.frame{
    border:8px solid #f5d36b;
    border-radius:20px;
    overflow:hidden;
    background:black;
}

.frame img,
.frame video{
    display:block;
    width:100%;
    height:520px;
    object-fit:cover;
}

h1{
    margin-top:20px;
    font-size:36px;
    color:#FFD700;
}

p{
    margin-top:10px;
    font-size:22px;
    color:#fff;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="card">

    <div class="frame">

        <!-- Фото -->
        <!--
        <img src="girl.jpg">
        -->

        <!-- Видео -->
        <video autoplay muted loop playsinline>
            <source src="girl.mp4" type="video/mp4">
        </video>

    </div>

    <h1>🎉 С Днём Рождения! 🎉</h1>

    <p>
        Пусть каждый день приносит счастье,<br>
        улыбки и исполнение всех желаний ❤️
    </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

const duration = Infinity;

function random(min,max){
    return Math.random()*(max-min)+min;
}

setInterval(()=>{

    confetti({
        particleCount:60,
        angle:random(0,360),
        spread:120,
        startVelocity:55,
        origin:{
            x:Math.random(),
            y:Math.random()*0.4
        },
        colors:[
            "#ff0040",
            "#00e5ff",
            "#FFD700",
            "#ff66ff",
            "#00ff99",
            "#ff8800",
            "#ffffff"
        ]
    });

},350);

</script>

</body>
</html>
