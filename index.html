<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🎉 С Днём Рождения ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            overflow-x:hidden; overflow-y:auto;
            background:radial-gradient(circle at top,#222,#050505 75%);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:'Poppins',sans-serif;
            color:#fff;
        }

        /* ---------- Основной контент ---------- */

        #content{
            transition:1s ease;
            filter:blur(10px) brightness(.45);
        }

        #content.active{
            filter:none;
        }

        canvas{
            position:fixed;
            inset:0;
            z-index:0;
        }

        .card{

            position:relative;
            z-index:2;

            width:430px;
            max-width:92vw;

            padding:22px;

            border-radius:28px;

            border:2px solid rgba(255,215,0,.8);

            background:rgba(255,255,255,.08);

            backdrop-filter:blur(18px);

            box-shadow:
                    0 0 35px rgba(255,215,0,.35),
                    0 20px 80px rgba(0,0,0,.6);

            text-align:center;
        }

        .frame{

            border:6px solid #f7d36c;

            border-radius:20px;

            overflow-x:hidden; overflow-y:auto;

            background:#000;

            box-shadow:
                    0 0 25px rgba(255,215,0,.25);

        }

        .frame video,
        .frame img{

            display:block;

            width:100%;
            height:520px;

            object-fit:cover;

        }

        h1{

            margin-top:24px;

            font-family:"Playfair Display",serif;

            font-size:42px;

            color:#FFE082;

            text-shadow:0 0 15px rgba(255,215,0,.45);

        }

        p{

            margin-top:15px;

            font-size:20px;

            line-height:1.8;

            font-weight:300;

        }

        /* ---------- Экран приветствия ---------- */

        #intro{

            position:fixed;
            inset:0;

            display:flex;
            justify-content:center;
            align-items:center;

            background:rgba(0,0,0,.45);

            backdrop-filter:blur(8px);

            z-index:9999;

            transition:1s;

        }

        .intro-box{

            text-align:center;

            padding:45px;

            border-radius:28px;

            background:rgba(255,255,255,.08);

            border:1px solid rgba(255,255,255,.15);

            box-shadow:0 0 30px rgba(255,215,0,.2);

        }

        .intro-box h2{

            font-family:"Playfair Display",serif;

            font-size:42px;

            color:#FFE082;

        }

        .intro-box p{

            margin:18px 0 30px;

            font-size:20px;

        }

        button{

            border:none;

            border-radius:16px;

            padding:18px 50px;

            cursor:pointer;

            font-size:22px;

            font-weight:600;

            color:#222;

            background:linear-gradient(135deg,#FFD54F,#FFB300);

            box-shadow:
                    0 0 30px rgba(255,215,0,.45);

            transition:.25s;

            animation:pulse 2s infinite;

        }

        button:hover{

            transform:scale(1.05);

        }

        @keyframes pulse{

            0%{transform:scale(1);}
            50%{transform:scale(1.05);}
            100%{transform:scale(1);}

        }

    

@media (max-width: 768px) {
    body {
        overflow-y: auto !important;
        overflow-x: hidden;
        padding: 15px;
        align-items: flex-start;
    }

    .card {
        width: 100% !important;
        max-width: 100% !important;
        margin: 20px 0;
        padding: 16px;
        border-radius: 18px;
    }

    .frame video,
    .frame img {
        height: 320px !important;
    }

    h1 {
        font-size: 30px !important;
    }

    p {
        font-size: 16px !important;
        line-height: 1.6;
    }

    button {
        width: 100%;
        font-size: 18px;
    }
}

</style>

</head>

<body>

<!-- Музыка -->
<audio id="music" preload="auto" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Экран приветствия -->

<div id="intro">

    <div class="intro-box">

        <h2>🎁 Небольшой сюрприз</h2>

        <p>Нажми кнопку, чтобы открыть поздравление ❤️</p>

        <button id="startButton">
            ▶ Открыть сюрприз
        </button>

    </div>

</div>

<!-- Контент -->

<div id="content">

    <canvas></canvas>

    <div class="card">

        <div class="frame">

            <!-- Если нужно фото -->
            <!--
            <img src="girl.jpg">
            -->

            <!-- Видео -->

            <video
                    id="video"
                    preload="auto"
                    muted
                    loop
                    playsinline
            >
                <source src="girl.mp4" type="video/mp4">
            </video>

        </div>

        <h1>🎉 С Днём Рождения! 🎉</h1>

        <p>

            Пусть каждый день приносит счастье,<br>
            любовь, вдохновение,<br>
            яркие эмоции и исполнение<br>
            самых заветных желаний ❤️

        </p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

    // ===============================
    // Элементы
    // ===============================

    const intro = document.getElementById("intro");
    const content = document.getElementById("content");
    const music = document.getElementById("music");
    const video = document.getElementById("video");

    // Громкость
    music.volume = 0.45;

    // ===============================
    // Запуск поздравления
    // ===============================

    document.getElementById("startButton").addEventListener("click", async () => {

        content.classList.add("active");

        intro.style.opacity = "0";
        intro.style.pointerEvents = "none";

        // Музыка
        try{
            music.currentTime = 0;
            await music.play();
        }catch(e){
            console.log(e);
        }

        // Видео
        try{
            video.currentTime = 0;
            await video.play();
        }catch(e){
            console.log(e);
        }

        setTimeout(()=>{
            intro.remove();
        },1000);

    });

    // ===============================
    // Принудительный Loop
    // ===============================

    // Видео
    video.addEventListener("ended", () => {
        video.currentTime = 0;
        video.play();
    });

    // Музыка
    music.addEventListener("ended", () => {
        music.currentTime = 0;
        music.play();
    });

    // ===============================
    // Фейерверки
    // ===============================

    function random(min,max){
        return Math.random()*(max-min)+min;
    }

    setInterval(()=>{

        confetti({

            particleCount:65,

            spread:120,

            startVelocity:55,

            angle:random(0,360),

            origin:{
                x:Math.random(),
                y:Math.random()*0.45
            },

            colors:[
                "#FFD700",
                "#ff0040",
                "#00e5ff",
                "#ff66ff",
                "#00ff99",
                "#ff8800",
                "#ffffff"
            ]

        });

    },350);

</script>

</body>
</html>
