<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🎉 С Днём Рождения ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            overflow:hidden;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:radial-gradient(circle at top,#222,#050505 75%);
            font-family:'Poppins',sans-serif;
            color:white;
        }

        /* ---------- Контент ---------- */

        #content{
            transition:1.2s;
            filter:blur(10px) brightness(.45);
        }

        #content.active{
            filter:none;
        }

        canvas{
            position:fixed;
            inset:0;
            z-index:0;
        }

        .card{

            position:relative;
            z-index:2;

            width:430px;
            max-width:92vw;

            padding:22px;

            border-radius:30px;

            border:2px solid rgba(255,215,0,.8);

            background:rgba(255,255,255,.08);

            backdrop-filter:blur(18px);

            box-shadow:
                    0 0 35px rgba(255,215,0,.35),
                    0 20px 80px rgba(0,0,0,.55);

            text-align:center;
        }

        .frame{

            border:6px solid #f7d36c;

            border-radius:20px;

            overflow:hidden;

            background:#000;

        }

        .frame video,
        .frame img{

            width:100%;
            height:520px;

            object-fit:cover;

            display:block;

        }

        h1{

            margin-top:24px;

            font-size:42px;

            color:#FFE082;

            font-family:'Playfair Display',serif;

            text-shadow:0 0 15px rgba(255,215,0,.45);

        }

        p{

            margin-top:15px;

            line-height:1.8;

            font-size:20px;

            font-weight:300;

        }

        /* ---------- Экран приветствия ---------- */

        #intro{

            position:fixed;

            inset:0;

            background:rgba(0,0,0,.45);

            backdrop-filter:blur(6px);

            display:flex;

            justify-content:center;

            align-items:center;

            z-index:9999;

            transition:1s;

        }

        .intro-box{

            text-align:center;

            padding:45px;

            border-radius:28px;

            background:rgba(255,255,255,.08);

            border:1px solid rgba(255,255,255,.2);

            box-shadow:
                    0 0 30px rgba(255,215,0,.15);

        }

        .intro-box h2{

            font-family:'Playfair Display',serif;

            font-size:42px;

            color:#FFE082;

        }

        .intro-box p{

            margin:18px 0 30px;

            font-size:20px;

        }

        button{

            padding:18px 48px;

            border:none;

            border-radius:16px;

            cursor:pointer;

            font-size:22px;

            font-weight:600;

            background:linear-gradient(135deg,#FFD54F,#FFB300);

            color:#222;

            transition:.3s;

            box-shadow:
                    0 0 25px rgba(255,215,0,.45);

            animation:pulse 2s infinite;

        }

        button:hover{

            transform:scale(1.05);

        }

        @keyframes pulse{

            0%{transform:scale(1);}
            50%{transform:scale(1.04);}
            100%{transform:scale(1);}

        }

    </style>

</head>

<body>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="intro">

    <div class="intro-box">

        <h2>🎁 Небольшой сюрприз</h2>

        <p>Нажми кнопку, чтобы открыть поздравление ❤️</p>

        <button id="startButton">
            ▶ Открыть сюрприз
        </button>

    </div>

</div>

<div id="content">

    <canvas id="fireworks"></canvas>

    <div class="card">

        <div class="frame">

            <!-- Фото -->
            <!--
            <img src="girl.jpg">
            -->

            <!-- Видео -->
            <video id="video" muted loop playsinline>
                <source src="girl.mp4" type="video/mp4">
            </video>

        </div>

        <h1>🎉 С Днём Рождения! 🎉</h1>

        <p>

            Пусть каждый день приносит счастье,<br>
            улыбки, любовь,<br>
            яркие эмоции и исполнение<br>
            самых заветных желаний ❤️

        </p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

    const video=document.getElementById("video");
    const music=document.getElementById("music");
    const intro=document.getElementById("intro");
    const content=document.getElementById("content");

    document.getElementById("startButton").onclick=async()=>{

        content.classList.add("active");

        intro.style.opacity="0";

        intro.style.pointerEvents="none";

        try{
            await music.play();
        }catch(e){}

        try{
            await video.play();
        }catch(e){}

        setTimeout(()=>{
            intro.remove();
        },1000);

    };

    function random(min,max){
        return Math.random()*(max-min)+min;
    }

    setInterval(()=>{

        confetti({

            particleCount:65,

            spread:120,

            startVelocity:55,

            origin:{
                x:Math.random(),
                y:Math.random()*0.45
            },

            colors:[
                "#ff0040",
                "#00e5ff",
                "#FFD700",
                "#00ff99",
                "#ff66ff",
                "#ff8800",
                "#ffffff"
            ]

        });

    },350);

</script>

</body>
</html>
